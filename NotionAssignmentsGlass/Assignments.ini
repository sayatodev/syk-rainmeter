[Rainmeter]
Update=1000
AccurateText=1
BackgroundMode=2
SolidColor=0,0,0,1
OnRefreshAction=[!Move "20" "20"][!SetWindowProperty "Draggable" "0"]

[Metadata]
Name=Notion Assignments Glass
Author=Sayako
Information=A glass-themed skin showing upcoming assignments from Notion.
Version=1.0

[Variables]
@includeSecret=#ROOTCONFIGPATH#\..\@Resources\Secret.inc
@includeVars=#ROOTCONFIGPATH#\..\@Resources\Variables.inc

ColorTitle=255,255,255
ColorText=255,255,255
ColorDim=220,220,220
ColorToday=142,192,216
ColorHigh=227,128,128
ColorMedium=244,216,120
ColorExam=255,178,92
ColorLow=151,225,179

Font=#FontFace#
FontSize1=20
FontSize2=16
FontSizeMeta=13
SkinWidth=500
CardPadding=25
ItemHeight=62
NumOfItems=12
ReaderUpdateRate=900
NotionVersion=2026-03-11
RefreshIntervalSeconds=900

VisibleItems=1
Item1Title=Loading assignments...
Item1Meta=
Item1Color=#ColorText#
Item1Url=
Item2Title=
Item2Meta=
Item2Color=#ColorText#
Item2Url=
Item3Title=
Item3Meta=
Item3Color=#ColorText#
Item3Url=
Item4Title=
Item4Meta=
Item4Color=#ColorText#
Item4Url=
Item5Title=
Item5Meta=
Item5Color=#ColorText#
Item5Url=
Item6Title=
Item6Meta=
Item6Color=#ColorText#
Item6Url=
Item7Title=
Item7Meta=
Item7Color=#ColorText#
Item7Url=
Item8Title=
Item8Meta=
Item8Color=#ColorText#
Item8Url=
Item9Title=
Item9Meta=
Item9Color=#ColorText#
Item9Url=
Item10Title=
Item10Meta=
Item10Color=#ColorText#
Item10Url=
Item11Title=
Item11Meta=
Item11Color=#ColorText#
Item11Url=
Item12Title=
Item12Meta=
Item12Color=#ColorText#
Item12Url=

[StyleTitle]
FontFace=#Font#
FontSize=#FontSize1#
FontColor=#ColorTitle#
AntiAlias=1
ClipString=1
W=(#SkinWidth# - 50)
X=25
Y=24

[StyleItemTitle]
FontFace=#Font#
FontSize=#FontSize2#
FontColor=#ColorText#
AntiAlias=1
ClipString=1
W=(#SkinWidth# - 50)
X=25
Y=40r

[StyleItemMeta]
FontFace=#Font#
FontSize=#FontSizeMeta#
FontColor=#ColorDim#
AntiAlias=1
ClipString=1
W=(#SkinWidth# - 50)
X=25
Y=20r

[MeasureScript]
Measure=Script
ScriptFile="#@#Measures\Assignments.lua"
UpdateDivider=-1
FinishAction=[!UpdateMeterGroup "AssignmentData"][!Redraw]

[CardHeightVal]
Measure=Calc
Formula=(90 + (#VisibleItems# * #ItemHeight#))
DynamicVariables=1

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#SkinWidth#,[CardHeightVal],20 | Fill Color 0,0,0,40 | StrokeWidth 0
DynamicVariables=1

[MeterTitle]
Meter=String
MeterStyle=StyleTitle
Text=Upcoming Assignments
Group=AssignmentData
DynamicVariables=1

[MeterSeparator]
Meter=Shape
Shape=Rectangle 25,68,(#SkinWidth#-50),1 | Fill Color 255,255,255,40 | StrokeWidth 0

[MeterItem1Title]
Meter=String
MeterStyle=StyleItemTitle
Y=80
Text=#Item1Title#
FontColor=#Item1Color#
LeftMouseUpAction=["#Item1Url#"]
Group=AssignmentData
DynamicVariables=1

[MeterItem1Meta]
Meter=String
MeterStyle=StyleItemMeta
Text=#Item1Meta#
LeftMouseUpAction=["#Item1Url#"]
Group=AssignmentData
DynamicVariables=1

