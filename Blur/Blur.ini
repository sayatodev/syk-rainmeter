[Rainmeter]
Update=-1
AccurateText=1
OnRefreshAction=[!Move "0" "0"]
AlwaysOnBottom=1

[FrostedGlass]
Measure=Plugin
Plugin=FrostedGlass
Type=Blur
Border=None 

[Metadata]
Name=Screen Blur
Author=Sayako
Information=A separate skin that adds a Gaussian-like blur effect to the background, positioned behind everything.
Version=1.0

[Variables]
@include=#ROOTCONFIGPATH#\..\@Resources\Variables.inc

; --- Meters ---

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#ScreenWidth#,#ScreenHeight# | Fill Color 0,0,0,3 | StrokeWidth 0
W=#ScreenWidth#
H=#ScreenHeight#
DynamicVariables=1
