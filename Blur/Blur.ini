[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
OnRefreshAction=[!Move "#VSCREENAREAX#" "#VSCREENAREAY#"]
AlwaysOnBottom=1
ClickThrough=1

[FrostedGlass]
Measure=Plugin
Plugin=FrostedGlass
Type=Blur
Border=None
UpdateDivider=5

[MeasureBlurGuard]
Measure=Script
ScriptFile=#@#Blur.lua
UpdateDivider=1

[Metadata]
Name=Screen Blur
Author=Sayako
Information=A separate skin that adds a Gaussian-like blur effect to the background, positioned behind everything.
Version=1.0

[Variables]
@include=#ROOTCONFIGPATH#\..\@Resources\Variables.inc

; --- Meters ---

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#ScreenWidth#,#ScreenHeight# | Fill Color 0,0,0,3 | StrokeWidth 0
W=#ScreenWidth#
H=#ScreenHeight#
DynamicVariables=1
