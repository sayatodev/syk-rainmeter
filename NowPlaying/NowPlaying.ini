[Rainmeter]
Update=250
AccurateText=1
DynamicWindowSize=1
; Adjust position as needed, keeping it relative to screen
OnRefreshAction=[!Move "(#VSCREENAREAWIDTH# - 500 - 20)" "20"]

[Metadata]
Name=NowPlaying
Author=Sayako
Information=Glass card music info skin matching Calendar styles.
Version=1.2

[Variables]
; --- APPEARANCE ---
@includeVars=#ROOTCONFIGPATH#\..\@Resources\Variables.inc
ColorTitle=255,255,255
ColorDim=220,220,220
Font=#FontFace#
FontSize1=20
FontSize2=16
FontSize3=13
SkinWidth=500
CardPadding=25
RefreshIntervalSeconds=5
ProgressBarWidth=(#SkinWidth# - 50)
NowPlayingTitle=
NowPlayingArtist=
NowPlayingTimeText=
NowPlayingProgressWidth=0

; --- Measures ---

[MeasureNowPlaying]
Measure=Script
ScriptFile=#ROOTCONFIGPATH#\..\@Resources\NowPlaying.lua
UpdateDivider=1

[MeasureNowPlayingStarter]
Measure=Plugin
Plugin=RunCommand
Program=#CURRENTPATH#NowPlayingSession.exe
Parameter=--watch --out "#CURRENTPATH#nowplaying-cache.txt" --interval-ms 5000
State=Hide
UpdateDivider=-1
DynamicVariables=1

[MeasureGlass]
Border=None
Corner=Round
DarkMode=1
UpdateDivider=-1

; --- STYLES ---

[StyleTitle]
FontFace=#Font#
FontSize=#FontSize1#
FontColor=#ColorTitle#
AntiAlias=1
ClipString=1
W=(#SkinWidth# - 5)
X=25
Y=24

[StyleItemTitle]
FontFace=#Font#
FontSize=#FontSize2#
FontColor=#ColorTitle#
AntiAlias=1
ClipString=1
W=(#SkinWidth# - 5)
X=25
Y=40r

[StyleItemMeta]
FontFace=#Font#
FontSize=#FontSize3#
FontColor=#ColorDim#
AntiAlias=1
ClipString=1
W=(#SkinWidth# - 50)
X=25
Y=18r

; --- Meters ---

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#SkinWidth#,145,20 | Fill Color 0,0,0,40 | StrokeWidth 0
DynamicVariables=1
Group=NowPlayingData

[MeterTitle]
Meter=String
MeterStyle=StyleTitle
Text=#NowPlayingTitle#
; Override Y to be absolute within this card
Y=25
DynamicVariables=1
Group=NowPlayingData

[MeterArtist]
Meter=String
MeterStyle=StyleItemTitle
ClipString=0
Text=#NowPlayingArtist#
; Position relative to title
Y=35r
DynamicVariables=1
Group=NowPlayingData

[MeterLength]
Meter=String
MeterStyle=StyleItemMeta
Text=#NowPlayingTimeText#
Y=24r
DynamicVariables=1
Group=NowPlayingData

[MeterProgressTrack]
Meter=Shape
Shape=Rectangle 25,111,#ProgressBarWidth#,6,3 | Fill Color 255,255,255,35 | StrokeWidth 0
DynamicVariables=1
Group=NowPlayingData

[MeterProgressFill]
Meter=Shape
Shape=Rectangle 25,111,#NowPlayingProgressWidth#,6,3 | Fill Color 255,255,255,180 | StrokeWidth 0
DynamicVariables=1
Group=NowPlayingData


